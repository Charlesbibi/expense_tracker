{% load i18n %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · 家庭财务管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 动态背景 */
        .bg-orbs {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: .35;
            animation: orbFloat 8s ease-in-out infinite alternate;
        }
        .orb-1 { width: 520px; height: 520px; background: #4f81ff; top:-10%; left:-10%; animation-delay:0s; }
        .orb-2 { width: 400px; height: 400px; background: #a855f7; bottom:-10%; right:-10%; animation-delay:2s; }
        .orb-3 { width: 300px; height: 300px; background: #22c55e; top:40%; right:20%; animation-delay:4s; }
        @keyframes orbFloat {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.08); }
        }

        /* 登录卡片 */
        .login-wrapper { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 24px; }

        .login-card {
            background: rgba(255,255,255,.07);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border: 1px solid rgba(255,255,255,.14);
            border-radius: 24px;
            padding: 44px 40px 36px;
            box-shadow: 0 32px 80px rgba(0,0,0,.5);
        }

        /* Logo */
        .login-logo {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, #4f81ff 0%, #a855f7 100%);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: #fff;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(79,129,255,.4);
        }
        .login-title {
            font-size: 1.6rem; font-weight: 700; color: #fff;
            text-align: center; margin-bottom: 4px;
        }
        .login-subtitle {
            font-size: .85rem; color: rgba(255,255,255,.45);
            text-align: center; margin-bottom: 32px;
        }

        /* 输入框 */
        .input-group-login {
            position: relative; margin-bottom: 18px;
        }
        .input-group-login .field-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,.35); font-size: 16px; z-index: 2;
        }
        .input-group-login input {
            width: 100%;
            background: rgba(255,255,255,.09);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: 12px;
            color: #fff;
            padding: 13px 16px 13px 44px;
            font-size: .9rem;
            transition: border-color .2s, box-shadow .2s, background .2s;
            outline: none;
        }
        .input-group-login input::placeholder { color: rgba(255,255,255,.3); }
        .input-group-login input:focus {
            background: rgba(255,255,255,.14);
            border-color: #4f81ff;
            box-shadow: 0 0 0 3px rgba(79,129,255,.25);
        }
        .input-group-login input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 50px #1e293b inset;
            -webkit-text-fill-color: #fff;
        }

        /* 错误提示 */
        .login-error {
            background: rgba(239,68,68,.15);
            border: 1px solid rgba(239,68,68,.3);
            color: #fca5a5;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: .85rem;
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 18px;
        }

        /* 按钮 */
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #4f81ff 0%, #a855f7 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: .95rem;
            padding: 13px;
            cursor: pointer;
            transition: opacity .2s, transform .15s, box-shadow .2s;
            box-shadow: 0 6px 20px rgba(79,129,255,.4);
            margin-top: 8px;
        }
        .btn-login:hover {
            opacity: .92;
            box-shadow: 0 8px 28px rgba(79,129,255,.55);
            transform: translateY(-1px);
        }
        .btn-login:active { transform: translateY(0); }

        /* 底部文字 */
        .login-footer {
            text-align: center; margin-top: 24px;
            color: rgba(255,255,255,.25); font-size: .78rem;
        }
    </style>
</head>
<body>

<!-- 动态背景球 -->
<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div class="login-wrapper">
    <div class="login-card">

        <div class="login-logo">
            <i class="bi bi-house-heart-fill"></i>
        </div>
        <h1 class="login-title">家庭财务管理</h1>
        <p class="login-subtitle">记录每一笔，掌握每一分</p>

        <form method="post" id="loginForm">
            {% csrf_token %}

            {% if form.errors %}
            <div class="login-error">
                <i class="bi bi-shield-exclamation"></i>
                用户名或密码有误，请重试
            </div>
            {% endif %}

            <div class="input-group-login">
                <i class="bi bi-person field-icon"></i>
                <input type="text" name="username" placeholder="用户名" autofocus required>
            </div>

            <div class="input-group-login">
                <i class="bi bi-lock field-icon"></i>
                <input type="password" name="password" id="pwdInput" placeholder="密码" required>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <i class="bi bi-box-arrow-in-right me-2"></i>登 录
            </button>
        </form>

        <p class="login-footer">© 2025 家庭财务记录系统</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = document.getElementById('loginBtn');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>验证中…';
    btn.disabled = true;
});
</script>
</body>
</html>
